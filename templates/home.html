<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boston House Price Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{

    width:100%;
    max-width:900px;
    background:white;
    border-radius:15px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);

}

h1{

    text-align:center;
    color:#1e3a8a;
    margin-bottom:10px;

}

.subtitle{

    text-align:center;
    color:#666;
    margin-bottom:30px;

}

form{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;

}

.input-group{

    display:flex;
    flex-direction:column;

}

label{

    font-weight:600;
    margin-bottom:6px;
    color:#333;

}

input{

    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;

}

input:focus{

    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 5px rgba(37,99,235,.3);

}

.full{

    grid-column:1/3;

}

button{

    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;

}

button:hover{

    background:#1d4ed8;

}

.result{

    margin-top:30px;
    background:#ecfdf5;
    color:#065f46;
    padding:18px;
    border-radius:10px;
    text-align:center;
    font-size:22px;
    font-weight:600;

}

.footer{

    margin-top:25px;
    text-align:center;
    color:#888;
    font-size:14px;

}

@media(max-width:768px){

form{

grid-template-columns:1fr;

}

.full{

grid-column:1;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Boston House Price Prediction</h1>

<p class="subtitle">
Enter the housing parameters below to estimate the house price.
</p>

<form action="{{ url_for('predict') }}" method="post">

<div class="input-group">
<label>CRIM</label>
<input type="number" step="any" name="CRIM" required>
</div>

<div class="input-group">
<label>ZN</label>
<input type="number" step="any" name="ZN" required>
</div>

<div class="input-group">
<label>INDUS</label>
<input type="number" step="any" name="INDUS" required>
</div>

<div class="input-group">
<label>CHAS</label>
<input type="number" step="any" name="CHAS" required>
</div>

<div class="input-group">
<label>NOX</label>
<input type="number" step="any" name="NOX" required>
</div>

<div class="input-group">
<label>RM</label>
<input type="number" step="any" name="RM" required>
</div>

<div class="input-group">
<label>AGE</label>
<input type="number" step="any" name="Age" required>
</div>

<div class="input-group">
<label>DIS</label>
<input type="number" step="any" name="DIS" required>
</div>

<div class="input-group">
<label>RAD</label>
<input type="number" step="any" name="RAD" required>
</div>

<div class="input-group">
<label>TAX</label>
<input type="number" step="any" name="TAX" required>
</div>

<div class="input-group">
<label>PTRATIO</label>
<input type="number" step="any" name="PTRATIO" required>
</div>

<div class="input-group">
<label>B</label>
<input type="number" step="any" name="B" required>
</div>

<div class="input-group full">
<label>LSTAT</label>
<input type="number" step="any" name="LSTAT" required>
</div>

<div class="full">
<button type="submit">
Predict House Price
</button>
</div>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

<div class="footer">
Machine Learning Flask Application | Boston Housing Prediction
</div>

</div>

</body>
</html>
